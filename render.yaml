services:
  # ─── Next.js Frontend ──────────────────────────────────────────────
  - type: web
    name: aiecommerce-frontend
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: MONGODB_URI
        sync: false  # Set manually in Render dashboard
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false  # Set to your Render frontend URL, e.g. https://aiecommerce-frontend.onrender.com
      - key: NEXT_PUBLIC_API_URL
        sync: false  # Set to your Render backend URL, e.g. https://aiecommerce-backend.onrender.com

  # ─── Django Backend (SSE + RAG) ────────────────────────────────────
  - type: web
    name: aiecommerce-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn config.asgi:application -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120 --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        sync: false  # Set manually in Render dashboard
      - key: GEMINI_API_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false  # Set to: aiecommerce-backend.onrender.com
